<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Shop</title>
  <link rel="stylesheet" href="brand.css"/>
  <style>
    html,body { margin:0; padding:0; min-height:100vh; background:#2a2419; font-family:Geist,system-ui,sans-serif; }
    .shell { max-width:480px; margin:0 auto; min-height:100vh; }
    .topbar { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; color:#f4efe6; }
    .topbar a { color:#d9b13a; text-decoration:none; font-size:12px; }
    .topbar .nm { font-family:'DM Serif Display'; font-size:18px; }
    .topbar .nm em { color:#d9b13a; font-style:italic; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="rk-config.js"></script>
  <script src="rk-auth.js"></script>
  <script src="rk-stock.js"></script>
  <script src="rk-brain.js"></script>
  <script src="rk-store.js"></script>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="nm" id="brand"></div>
      <div id="acct"></div>
    </div>
    <div id="root"></div>
  </div>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="rk-shared.jsx"></script>
  <script type="text/babel" src="rk-home.jsx"></script>
  <script type="text/babel" src="rk-home-stock.jsx"></script>
  <script type="text/babel" src="rk-screens.jsx"></script>
  <script type="text/babel" src="rk-map.jsx"></script>
  <script type="text/babel" src="rk-customer-app.jsx"></script>
  <script type="text/babel">
    const cfg = RK_CONFIG.load();
    document.getElementById('brand').innerHTML = cfg.brand_name + '<em>.</em>';
    document.title = cfg.brand_name + ' · Shop';
    const u = RK_AUTH.current();
    document.getElementById('acct').innerHTML = u
      ? `<a href="#" id="out">${u.name} · sign out</a>`
      : '<a href="Login.html">Sign in</a>';
    if (u) document.getElementById('out').onclick = (e) => { e.preventDefault(); RK_AUTH.signOut(); location.href='Login.html'; };
    ReactDOM.createRoot(document.getElementById('root')).render(<CustomerApp/>);
  </script>
</body>
</html>
