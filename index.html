<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="theme-color" content="#1d1a14"/>
  <title>Loading…</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon.svg"/>
  <link rel="stylesheet" href="brand.css"/>
  <style>
    html, body { margin: 0; padding: 0; min-height: 100vh; background: #1d1a14; display: flex; align-items: center; justify-content: center; font-family: Geist, system-ui, sans-serif; }
    .splash { text-align: center; }
    .mark { font-family: 'DM Serif Display', Georgia, serif; font-size: 72px; color: #f4efe6; line-height: 1; }
    .mark em { color: #d9b13a; font-style: italic; }
    .sub { font-size: 13px; color: rgba(244,239,230,0.5); margin-top: 12px; letter-spacing: 0.1em; }
    .spinner { width: 32px; height: 32px; border: 2px solid rgba(244,239,230,0.15); border-top-color: #d9b13a; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 28px auto 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .links { margin-top: 40px; display: flex; flex-direction: column; gap: 10px; }
    .links a { display: block; padding: 14px 24px; border-radius: 999px; text-decoration: none; font-size: 13px; font-weight: 500; transition: opacity 0.15s; }
    .links a:hover { opacity: 0.85; }
    .btn-primary { background: #f4efe6; color: #1d1a14; }
    .btn-ghost { background: transparent; color: rgba(244,239,230,0.7); border: 1px solid rgba(244,239,230,0.2); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="rk-config.js"></script>
  <script src="rk-supabase.js"></script>
  <script src="rk-auth.js"></script>
</head>
<body>
  <div class="splash">
    <div class="mark" id="brand-mark">R<em>.</em></div>
    <div class="sub" id="brand-tagline">Your corner shop, delivered.</div>
    <div class="spinner" id="spinner"></div>
    <div class="links" id="links" style="display:none"></div>
  </div>

  <script>
    const cfg = RK_CONFIG.load();
    document.title = cfg.brand_name;
    document.getElementById('brand-mark').innerHTML = cfg.brand_name + '<em>.</em>';
    document.getElementById('brand-tagline').textContent = cfg.brand_tagline || 'Your corner shop, delivered.';

    // Auto-redirect signed-in users
    const user = RK_AUTH.current();
    if (user) {
      window.location.href = RK_AUTH.landingFor(user);
    } else {
      // Not signed in — show quick nav after brief splash
      setTimeout(() => {
        document.getElementById('spinner').style.display = 'none';
        const links = document.getElementById('links');
        links.style.display = 'flex';
        links.innerHTML = `
          <a href="Customer.html" class="btn-primary">Shop online →</a>
          <a href="Login.html" class="btn-ghost">Staff / manager sign in</a>
        `;
      }, 600);
    }

    // Register service worker for offline + PWA install
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
